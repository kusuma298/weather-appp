<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0077ff;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#0077ff;
            text-decoration:none;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <form>

            <input type="text" placeholder="Username" required>

            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <p>Don't have an account? <a href="#">Signup</a></p>

    </div>

</body>
</html>
